<!DOCTYPE html><html lang="ja"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Count</title>
<link rel="stylesheet" href="style.css?v=3000">
</head><body>
<main>
  <header>
    <div id="today"></div>
    <a href="history.html">履歴</a>
  </header>

  <section class="panel">
    <div class="form">
      <label>担当者<select id="staff">
        <option value="">選択してくださ</option><option>林</option><option>村上</option><option>亀田</option><option>小寺</option><option>海野</option>
      </select></label>
      <label>エリア<input id="area" placeholder="例：新宿"></label>
    </div>

    <div class="summary">
      <div><p>合計</p><strong id="total">0</strong></div>
      <div><p>稼働時間</p><strong id="time">00:00:00</strong></div>
    </div>

    <div class="actions">
      <button id="start">稼働開始</button>
      <button id="finish">稼働終了</button>
    </div>
    <p id="status">未保存</p>
  </section>

  <section id="grid"></section>
  <button id="reset">リセット</button>
</main>
<script src="script.js?v=1000"></script>
</body></html>
