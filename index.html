<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Counter</title>
<style>
body{
margin:0;
padding:20px;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:#f2f2f7;
}

.container{
max-width:500px;
margin:auto;
}

.card{
background:#fff;
border-radius:18px;
padding:18px;
margin-bottom:18px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
}

h1{
text-align:center;
margin-bottom:20px;
}

select,input{
width:100%;
padding:14px;
font-size:18px;
border-radius:12px;
border:1px solid #ddd;
margin-bottom:12px;
box-sizing:border-box;
}

#time{
font-size:34px;
font-weight:bold;
text-align:center;
margin:15px 0;
}

#total{
font-size:54px;
font-weight:bold;
text-align:center;
}

.start{
width:100%;
background:#0A84FF;
color:#fff;
font-size:22px;
padding:15px;
border:none;
border-radius:15px;
margin-top:12px;
}

.finish{
width:100%;
background:#FF3B30;
color:#fff;
font-size:22px;
padding:15px;
border:none;
border-radius:15px;
margin-top:12px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:20px;
}

.item{
background:#fff;
padding:15px;
border-radius:18px;
text-align:center;
box-shadow:0 3px 10px rgba(0,0,0,.08);
}

.count{
font-size:48px;
font-weight:bold;
margin:10px 0;
}

button{
width:100%;
padding:14px;
font-size:26px;
border:none;
border-radius:12px;
margin-top:8px;
background:#0A84FF;
color:#fff;
}

.minus{
background:#FF3B30;
}
</style>
</head>

<body>

<div class="container">

<h1>Counter</h1>

<div class="card">

<label>担当者</label>
<select id="staff">
<option value="">選択してください</option>
<option>林</option>
<option>村上</option>
<option>亀田</option>
<option>小寺</option>
<option>海野</option>
</select>

<label>エリア</label>
<input
type="text"
id="area"
placeholder="例：新宿">

<div class="summary">

<h2>合計 <span id="total">0</span></h2>

<div id="time">00:00:00</div>

</div>

<button
class="start"
onclick="startWork()">
🟢 稼働開始
</button>

<button
class="finish"
onclick="finishWork()">
🔴 稼働終了
</button>

<button onclick="resetTime()">
⏱️ 時間リセット
</button>

<div id="saveStatus">
未保存
</div>

</div>

<div class="grid">

<div class="item">
<div class="title">🚪<br>不在</div>
<div id="absent" class="count">0</div>
<button onclick="plus('absent')">＋</button>
<button class="minus"
onclick="minus('absent')">－</button>
</div>

<div class="item">
<div class="title">🔕<br>インターホンNG</div>
<div id="intercom" class="count">0</div>
<button onclick="plus('intercom')">＋</button>
<button class="minus"
onclick="minus('intercom')">－</button>
</div>

<div class="item">
<div class="title">🚫<br>フロントNG</div>
<div id="front" class="count">0</div>
<button onclick="plus('front')">＋</button>
<button class="minus"
onclick="minus('front')">－</button>
</div>

<div class="item">
<div class="title">💬<br>トーク後NG</div>
<div id="talk" class="count">0</div>
<button onclick="plus('talk')">＋</button>
<button class="minus"
onclick="minus('talk')">－</button>
</div>

<div class="item">
<div class="title">❌<br>対象外</div>
<div id="target" class="count">0</div>
<button onclick="plus('target')">＋</button>
<button class="minus"
onclick="minus('target')">－</button>
</div>

<div class="item">
<div class="title">✅<br>アポ</div>
<div id="apo" class="count">0</div>
<button onclick="plus('apo')">＋</button>
<button class="minus"
onclick="minus('apo')">－</button>
</div>

</div>

</div>

<script>
let total = 0;
let timer = null;
let seconds = 0;

function updateTime(){

const h = String(Math.floor(seconds/3600)).padStart(2,"0");
const m = String(Math.floor((seconds%3600)/60)).padStart(2,"0");
const s = String(seconds%60).padStart(2,"0");

document.getElementById("time").innerText =
`${h}:${m}:${s}`;

}

function startWork(){

if(timer) return;

timer = setInterval(function(){

seconds++;
updateTime();

},1000);

}

function finishWork(){

clearInterval(timer);
timer = null;

}

function plus(id){

const el = document.getElementById(id);

el.innerText = Number(el.innerText)+1;

total++;

document.getElementById("total").innerText = total;
saveData();
}

function minus(id){

const el = document.getElementById(id);

let num = Number(el.innerText);

if(num>0){

el.innerText = num-1;

if(total>0){
total--;
document.getElementById("total").innerText = total;
}
saveData();
}

}
function resetTime() {
  clearInterval(timer);
  timer = null;
  seconds = 0;
  updateTime();
  saveData();
}
</script>
<button class="reset" onclick="resetAll()">
🔄 リセット
</button>
</body>
</html>
